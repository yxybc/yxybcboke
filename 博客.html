<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏与编程的个人博客</title>
    <style>
        /* 加载动画：极简转圈，贴合深色风格 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 2s ease;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #282828;
            border-top: 3px solid #8ab4f8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 深色模式 + 柔和渐变背景，保留极简核心 */
        body {
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            font: 16px/1.8 -apple-system, sans-serif;
            background: linear-gradient(135deg, oklab(34.846% 0 -0.00004), #103550);
            background-attachment: fixed;
            color: #e0e0e0;
            /* 初始隐藏，加载完成后显示 */
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.loaded {
            opacity: 1;
        }

        a {
            color: #e0e0e0;
            text-decoration: none;
        }

        a:hover {
            color: #8ab4f8;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            font-weight: 600;
            background: linear-gradient(to right, #5878ad, #e0e0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 文案样式：放大字体，贴合页面不突兀 */
        .quote {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 30px;
            background: linear-gradient(to right, #a0c8ff, #e0e0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.8;
        }

        .post {
            margin-bottom: 30px;
            border-bottom: 1px solid #282828;
            padding-bottom: 30px;
        }

        .date {
            font-size: 0.9rem;
            color: #999;
            display: block;
            margin-bottom: 8px;
        }

        /* 纯图标联系方式样式 */
        .contact-icons {
            margin: 50px 0 30px;
            padding-top: 20px;
            border-top: 1px solid #282828;
            display: flex;
            gap: 25px;
            align-items: center;
            font-size: 1.5rem;
        }

        .contact-icons a:hover {
            color: #8ab4f8;
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }

        /* 本站运行天数 */
        .site-runtime {
            margin: 20px 0;
            font-size: 0.9rem;
            color: #999;
            text-align: center;
            padding: 10px 0;
            border-top: 1px solid #282828;
        }

        .site-runtime span {
            color: #8ab4f8;
            font-weight: 500;
        }

        footer {
            margin-top: 20px;
            color: #999;
            font-size: 0.9rem;
            text-align: center;
        }

        .icon {
            font-family: "Segoe UI Symbol", sans-serif;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="loader">
        <div class="loader-spinner"></div>
    </div>

    <h1><a href="/">游戏与编程的个人博客</a></h1>
    <h2 class="quote" id="random-quote"></h2>

    <div class="post">

        <h2><a href="前端.html">HTML 极简网页搭建</a></h2>
        <p>用最少的代码，搭建极简风格的网页。</p>
        <p><a href="前端.html">查看详情</a></p>
    </div>

    <!-- 👉 这里新增了 Scratch 教学文章 -->
    <div class="post">
        <span class="date">2026-02-24 13:48 · Scratch</span>
        <h2><a href="scratch.html">Scratch 零基础完整教程</a></h2>
        <p>不用写代码，零基础也能做出自己的小游戏、动画。</p>
        <p><a href="scratch.html">查看详情</a></p>
    </div>

    <h2>你我虽远隔千山万水，但在这里，我们是朋友，是同路人。</h2>

    <div class="contact-icons">
        <h4>联系方式</h4>
        <a href="mailto:beijinghaiyangsoft@163.com" title="邮箱"><i class="fa-solid fa-envelope icon"></i></a>
        <a href="https://github.com/yxybc" target="_blank" title="GitHub"><i class="fa-brands fa-github icon"></i></a>
        <a href="https://space.bilibili.com/3546833473243300" target="_blank" title="bilibili"><i
                class="fa-brands fa-bilibili icon"></i></a>
    </div>

    <div class="site-runtime" id="runtime-container">
        本站已稳定运行 <span id="runtime-days">0</span> 天
    </div>

    <footer>© 2026 - 现在 极码智联科技</footer>

    <script>
        // 随机诗句
        window.addEventListener('DOMContentLoaded', function () {
            const quotes = [
                "海内存知己，天涯若比邻。",
                "树深时见鹿，溪午不闻钟。",
                "游戏藏天地，编程写初心。",
            ];
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('random-quote').textContent = quotes[randomIndex];

            // 运行天数
            const launchDate = new Date('2026-02-23');
            const today = new Date();
            const timeDiff = today - launchDate;
            const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const days = daysDiff > 0 ? daysDiff : 0;
            document.getElementById('runtime-days').textContent = days;
        });

        // 加载动画
        window.addEventListener('load', function () {
            const loader = document.querySelector('.loader');
            const body = document.querySelector('body');
            setTimeout(() => {
                loader.classList.add('hidden');
                body.classList.add('loaded');
            }, 800);
        });
    </script>
</body>

</html>
